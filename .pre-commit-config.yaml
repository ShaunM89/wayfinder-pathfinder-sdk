repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, src, tests]
      - id: ruff-format
        args: [src, tests]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 23.12.1
    hooks:
      - id: black
        args: [--check, src, tests]

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (unit tests only)
        entry: pytest -q --ignore=tests/test_async.py --ignore=tests/test_batch.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
